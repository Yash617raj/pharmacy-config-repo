server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=catalog-service
spring.cloud.gateway.routes[1].uri=lb://CATALOG-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/catalog/**

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[4].id=auth-service-openapi
spring.cloud.gateway.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/v3/api-docs/auth-service
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/v3/api-docs/auth-service, /v3/api-docs

spring.cloud.gateway.routes[5].id=catalog-service-openapi
spring.cloud.gateway.routes[5].uri=lb://CATALOG-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/v3/api-docs/catalog-service
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/v3/api-docs/catalog-service, /v3/api-docs

spring.cloud.gateway.routes[6].id=order-service-openapi
spring.cloud.gateway.routes[6].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/v3/api-docs/order-service
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/v3/api-docs/order-service, /v3/api-docs

spring.cloud.gateway.routes[7].id=admin-service-openapi
spring.cloud.gateway.routes[7].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/v3/api-docs/admin-service
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/v3/api-docs/admin-service, /v3/api-docs

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth-service

springdoc.swagger-ui.urls[1].name=Catalog Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/catalog-service

springdoc.swagger-ui.urls[2].name=Order Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/order-service

springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/admin-service

springdoc.swagger-ui.urls-primary-name=Auth Service
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

jwt.secret=mysupersecuresecretkeythatmustbeatleast32charslong
jwt.expiration=86400000
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
